syntax = "proto3";

package helloworld.v1;

// GreeterService is a minimal example service for godot-grpc, following
// Buf's standard conventions (versioned package, Service suffix, per-RPC
// request/response types) so it can serve as a good template for users.
service GreeterService {
  // SayHello returns a greeting for the given name.
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse);
}

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string message = 1;
}
